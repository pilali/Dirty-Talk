name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libgl1-mesa-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libjack-jackd2-dev liblo-dev
      - name: Build
        run: make -j$(nproc)
      - name: Generate LV2 ttl
        run: make gen
      - uses: actions/upload-artifact@v4
        with:
          name: dirty-talk-linux
          path: bin/

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build (universal)
        # DPF ships a convenience target that injects "-arch x86_64 -arch arm64"
        # into the build flags. The old "MACOS_UNIVERSAL=true" variable is not
        # understood by DPF and was silently ignored, producing a single-arch
        # (arm64) build on the Apple Silicon runner.
        run: make macos-universal-10.15 -j$(sysctl -n hw.ncpu)
      - name: Generate LV2 ttl
        run: make gen
      - name: Verify architectures and min macOS version
        # Guards the two things that make the plugin load on old macOS:
        #  1. both x86_64 and arm64 slices are present (universal), and
        #  2. each slice is tagged with the right deployment target.
        # The x86_64 slice must be minos 10.15 (Catalina / old Intel Macs).
        # The arm64 slice is always minos 11.0: Apple Silicon does not exist
        # before macOS 11, so the linker floors arm64 at 11.0 regardless of
        # -mmacosx-version-min. That is expected, not a regression.
        run: |
          status=0
          while IFS= read -r f; do
            file "$f" | grep -q 'Mach-O' || continue
            archs=$(lipo -archs "$f" 2>/dev/null)
            echo "$f: [$archs]"
            case " $archs " in *" x86_64 "*) ;; *) echo "  ERROR: missing x86_64"; status=1 ;; esac
            case " $archs " in *" arm64 "*) ;; *) echo "  ERROR: missing arm64"; status=1 ;; esac
            x86min=$(vtool -arch x86_64 -show-build "$f" 2>/dev/null | awk '/minos/{print $2}')
            armmin=$(vtool -arch arm64 -show-build "$f" 2>/dev/null | awk '/minos/{print $2}')
            echo "  x86_64 minos ${x86min:-none}, arm64 minos ${armmin:-none}"
            [ "$x86min" = "10.15" ] || { echo "  ERROR: x86_64 deployment target ${x86min:-none}, expected 10.15"; status=1; }
            [ "$armmin" = "11.0" ]  || { echo "  ERROR: arm64 deployment target ${armmin:-none}, expected 11.0"; status=1; }
          done < <(find bin -type f)
          exit $status
      - uses: actions/upload-artifact@v4
        with:
          name: dirty-talk-macos
          path: bin/

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            make
      - name: Build
        run: make -j$(nproc)
      - uses: actions/upload-artifact@v4
        with:
          name: dirty-talk-windows
          path: bin/
