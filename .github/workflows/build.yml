name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libgl1-mesa-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libjack-jackd2-dev liblo-dev
      - name: Build
        run: make -j$(nproc)
      - name: Generate LV2 ttl
        run: make gen
      - uses: actions/upload-artifact@v4
        with:
          name: dirty-talk-linux
          path: bin/

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build (universal)
        # DPF ships a convenience target that injects "-arch x86_64 -arch arm64"
        # into the build flags. The old "MACOS_UNIVERSAL=true" variable is not
        # understood by DPF and was silently ignored, producing a single-arch
        # (arm64) build on the Apple Silicon runner.
        run: make macos-universal-10.15 -j$(sysctl -n hw.ncpu)
      - name: Generate LV2 ttl
        run: make gen
      - name: Verify universal binaries
        run: |
          status=0
          while IFS= read -r f; do
            file "$f" | grep -q 'Mach-O' || continue
            archs=$(lipo -archs "$f" 2>/dev/null)
            echo "$f: $archs"
            case " $archs " in
              *" x86_64 "*) case " $archs " in *" arm64 "*) ;; *) echo "  ERROR: missing arm64"; status=1 ;; esac ;;
              *) echo "  ERROR: missing x86_64"; status=1 ;;
            esac
          done < <(find bin -type f)
          exit $status
      - uses: actions/upload-artifact@v4
        with:
          name: dirty-talk-macos
          path: bin/

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            make
      - name: Build
        run: make -j$(nproc)
      - uses: actions/upload-artifact@v4
        with:
          name: dirty-talk-windows
          path: bin/
