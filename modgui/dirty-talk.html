<div class="dirty-talk mod-pedal-pedal">

    <div class="mod-plugin-title">
        <h1>DIRTY TALK</h1>
        <h2>PILAL &middot; LO-FI VOCAL DISTORTION</h2>
    </div>

    <!-- Mode selector (enumeration) -->
    <div class="mode-row">
        <div class="mode-enum" mod-role="input-control-port" mod-port-symbol="mode">
            <div class="mode-readout" mod-role="input-control-value" mod-port-symbol="mode"></div>
        </div>
    </div>

    <!-- Knob row -->
    <div class="knob-row">

        <div class="knob-cell">
            <div class="dt-knob" mod-role="input-control-port" mod-port-symbol="center_freq"></div>
            <div class="knob-value" mod-role="input-control-value" mod-port-symbol="center_freq"></div>
            <div class="knob-label">FREQ</div>
        </div>

        <div class="knob-cell">
            <div class="dt-knob" mod-role="input-control-port" mod-port-symbol="bandwidth"></div>
            <div class="knob-value" mod-role="input-control-value" mod-port-symbol="bandwidth"></div>
            <div class="knob-label">BANDWIDTH</div>
        </div>

        <div class="knob-cell">
            <div class="dt-knob" mod-role="input-control-port" mod-port-symbol="gate"></div>
            <div class="knob-value" mod-role="input-control-value" mod-port-symbol="gate"></div>
            <div class="knob-label">GATE</div>
        </div>

        <div class="knob-cell">
            <div class="dt-knob" mod-role="input-control-port" mod-port-symbol="dry_wet"></div>
            <div class="knob-value" mod-role="input-control-value" mod-port-symbol="dry_wet"></div>
            <div class="knob-label">DRY/WET</div>
        </div>

    </div>

</div>
